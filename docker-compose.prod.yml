services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-agentclinic}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agentclinic}
      POSTGRES_DB: ${DB_NAME:-agentclinic}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-agentclinic}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
