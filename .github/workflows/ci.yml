name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  NODE_VERSION: 20

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --omit=optional

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Format
        run: npm run format:check

      - name: Unit tests
        run: npm run test:run

      - name: Build
        run: npm run build

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: [validate]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agentclinic
          POSTGRES_PASSWORD: agentclinic
          POSTGRES_DB: agentclinic
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --omit=optional

      - name: Run migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: postgres://agentclinic:agentclinic@localhost:5432/agentclinic

      - name: Seed database
        run: npm run db:seed
        env:
          DATABASE_URL: postgres://agentclinic:agentclinic@localhost:5432/agentclinic

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start dev server
        run: npm run dev &
        env:
          DATABASE_URL: postgres://agentclinic:agentclinic@localhost:5432/agentclinic

      - name: Wait for dev server
        run: |
          for i in {1..30}; do
            curl -s http://localhost:3000 > /dev/null 2>&1 && break
            sleep 2
          done

      - name: E2E smoke test
        run: npx playwright test e2e/smoke.spec.ts --reporter=list
        env:
          DATABASE_URL: postgres://agentclinic:agentclinic@localhost:5432/agentclinic
